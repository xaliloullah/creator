<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Page Translation Example</title>

        <!-- Intégration de Bootstrap 5 CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <style>
            /* Empêcher Google de modifier le body */
            body > .skiptranslate {
                display: none !important;
            }

            /* Empêcher Google d'ajouter un padding top */
            body {
                top: 0px !important;
            }

            /* Masquer le contenu avant que la traduction ne s'applique */
            body:not(.translated) {
                visibility: hidden;
            }
        </style>

        <!-- Charger Google Translate en amont -->
        <script
            type="text/javascript"
            src="https://translate.google.com/translate_a/element.js?cb=initTranslator"
            defer
        ></script>
    </head>

    <body>
        <div class="container mt-5">
            <h1 class="text-center">Welcome to my page</h1>

            <!-- Dropdown Bootstrap pour sélectionner la langue -->
            <div class="dropdown text-center mb-3">
                <button
                    class="btn btn-primary dropdown-toggle"
                    type="button"
                    id="dropdownLang"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                >
                    Choose Language
                </button>
                <ul class="dropdown-menu" aria-labelledby="dropdownLang">
                    <li>
                        <a
                            class="dropdown-item"
                            href="#"
                            onclick="changeLanguage('en')"
                            >English</a
                        >
                    </li>
                    <li>
                        <a
                            class="dropdown-item"
                            href="#"
                            onclick="changeLanguage('fr')"
                            >Français</a
                        >
                    </li>
                    <li>
                        <a
                            class="dropdown-item"
                            href="#"
                            onclick="changeLanguage('es')"
                            >Español</a
                        >
                    </li>
                    <li>
                        <a
                            class="dropdown-item"
                            href="#"
                            onclick="changeLanguage('de')"
                            >Deutsch</a
                        >
                    </li>
                    <li>
                        <a
                            class="dropdown-item"
                            href="#"
                            onclick="changeLanguage('it')"
                            >Italiano</a
                        >
                    </li>
                </ul>
            </div>

            <!-- Div pour le widget Google Translate (invisible) -->
            <div id="translator" style="display: none"></div>

            <!-- Contenu de la page -->
            <p class="lead text-center">
                This is an example of page translation. You can translate the
                page content into another language using the dropdown above.
            </p>

            <div class="d-flex justify-content-center">
                <button class="btn btn-primary">Example Button</button>
            </div>
        </div>

        <!-- Intégration de Bootstrap 5 JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

        <script type="text/javascript">
            function initTranslator() {
                new google.translate.TranslateElement(
                    { autoDisplay: false },
                    "translator"
                );

                // Appliquer automatiquement la dernière langue choisie
                let savedLang = localStorage.getItem("preferredLang");
                if (savedLang) {
                    setTimeout(() => changeLanguage(savedLang), 1000);
                }

                // Afficher la page après l'initialisation
                document.body.classList.add("translated");
            }

            function changeLanguage(lang) {
                localStorage.setItem("preferredLang", lang);
                let select = document.querySelector(".goog-te-combo");
                if (select) {
                    select.value = lang;
                    select.dispatchEvent(new Event("change"));
                }
            }
        </script>
    </body>
</html>

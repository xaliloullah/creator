<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Beautiful Color Picker</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            .color-option {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                cursor: pointer;
                transition: all 0.3s ease;
                border: 1px solid transparent;
            }
            .color-option:hover {
                transform: scale(1.1);
            }
            .color-option.active {
                border-color: #000;
                box-shadow: 0 0 0 2px #fff, 0 0 8px 4px #000;
            }
            .color-preview {
                width: 100px;
                height: 100px;
                border-radius: 50%;
                transition: all 0.3s ease;
                border: 1px solid transparent;
                border-color: #000;
                box-shadow: 0 0 0 2px #fff, 0 0 8px 4px #000;
            }
            @keyframes pulse {
                0% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.05);
                }
                100% {
                    transform: scale(1);
                }
            }
            .color-preview.pulse {
                animation: pulse 0.5s;
            }
        </style>
    </head>
    <body>
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <h2 class="text-center mb-4">Choisissez votre couleur</h2>
                    <div class="form-group">
                        <label
                            for="color-picker"
                            class="form-label visually-hidden"
                            >Couleur</label
                        >
                        <div
                            id="color-picker"
                            class="d-flex flex-wrap justify-content-center gap-3 mb-4"
                        >
                            <input
                                type="radio"
                                class="btn-check"
                                name="parametre[color]"
                                id="primary"
                                value="primary"
                                autocomplete="off"
                                checked
                            />
                            <label
                                class="color-option bg-primary"
                                for="primary"
                                title="Primary"
                            ></label>

                            <input
                                type="radio"
                                class="btn-check"
                                name="parametre[color]"
                                id="secondary"
                                value="secondary"
                                autocomplete="off"
                            />
                            <label
                                class="color-option bg-secondary"
                                for="secondary"
                                title="Secondary"
                            ></label>

                            <input
                                type="radio"
                                class="btn-check"
                                name="parametre[color]"
                                id="success"
                                value="success"
                                autocomplete="off"
                            />
                            <label
                                class="color-option bg-success"
                                for="success"
                                title="Success"
                            ></label>

                            <input
                                type="radio"
                                class="btn-check"
                                name="parametre[color]"
                                id="warning"
                                value="warning"
                                autocomplete="off"
                            />
                            <label
                                class="color-option bg-warning"
                                for="warning"
                                title="Warning"
                            ></label>

                            <input
                                type="radio"
                                class="btn-check"
                                name="parametre[color]"
                                id="danger"
                                value="danger"
                                autocomplete="off"
                            />
                            <label
                                class="color-option bg-danger"
                                for="danger"
                                title="Danger"
                            ></label>

                            <input
                                type="radio"
                                class="btn-check"
                                name="parametre[color]"
                                id="info"
                                value="info"
                                autocomplete="off"
                            />
                            <label
                                class="color-option bg-info"
                                for="info"
                                title="Info"
                            ></label>

                            <input
                                type="radio"
                                class="btn-check"
                                name="parametre[color]"
                                id="light"
                                value="light"
                                autocomplete="off"
                            />
                            <label
                                class="color-option bg-light"
                                for="light"
                                title="Light"
                            ></label>

                            <input
                                type="radio"
                                class="btn-check"
                                name="parametre[color]"
                                id="dark"
                                value="dark"
                                autocomplete="off"
                            />
                            <label
                                class="color-option bg-dark"
                                for="dark"
                                title="Dark"
                            ></label>
                        </div>
                    </div>
                    <div class="text-center">
                        <div class="d-inline-block">
                            <div
                                class="color-preview bg-primary mb-2 mx-auto"
                            ></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const colorPicker = document.getElementById("color-picker");
                const selectedColorPreview =
                    document.querySelector(".color-preview");

                colorPicker.addEventListener("change", function (event) {
                    if (event.target.type === "radio") {
                        const selectedColor = event.target.value;
                        selectedColorPreview.className = `color-preview bg-${selectedColor} mb-2 mx-auto`;

                        // Remove active class from all options
                        document
                            .querySelectorAll(".color-option")
                            .forEach((option) => {
                                option.classList.remove("active");
                            });

                        // Add active class to selected option
                        event.target.nextElementSibling.classList.add("active");

                        // Add pulse animation
                        selectedColorPreview.classList.add("pulse");
                        setTimeout(() => {
                            selectedColorPreview.classList.remove("pulse");
                        }, 500);
                    }
                });
            });
        </script>
    </body>
</html>

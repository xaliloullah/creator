<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Exemple DataTables avec Buttons et Foundation</title>

        <!-- Lien vers le CSS de Foundation -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/foundation-sites@6.6.3/dist/css/foundation.min.css"
        />

        <!-- Lien vers le CSS de DataTables -->
        <link
            rel="stylesheet"
            href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css"
        />

        <!-- Lien vers les styles des Buttons -->
        <link
            rel="stylesheet"
            href="https://cdn.datatables.net/buttons/3.2.1/css/buttons.foundation.min.css"
        />
    </head>
    <body>
        <div class="container">
            <h1>Exemple de Table avec DataTables et Buttons</h1>
            <table id="example" class="table">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Poste</th>
                        <th>Âge</th>
                        <th>Ville</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Jean Dupont</td>
                        <td>Développeur</td>
                        <td>30</td>
                        <td>Paris</td>
                    </tr>
                    <tr>
                        <td>Marie Dubois</td>
                        <td>Designer</td>
                        <td>25</td>
                        <td>Lyon</td>
                    </tr>
                    <tr>
                        <td>Paul Martin</td>
                        <td>Chef de projet</td>
                        <td>40</td>
                        <td>Marseille</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Lien vers jQuery -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <!-- Lien vers DataTables JS -->
        <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>

        <!-- Lien vers les Buttons JS -->
        <script src="https://cdn.datatables.net/buttons/3.2.1/js/dataTables.buttons.min.js"></script>

        <!-- Lien vers le script de Foundation -->
        <script src="https://cdn.jsdelivr.net/npm/foundation-sites@6.6.3/dist/js/foundation.min.js"></script>

        <!-- Lien vers le script d'exportation des Buttons (CSV, Excel, PDF, etc.) -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/vfs-fonts/1.0.1/vfs_fonts.js"></script>
        <script src="https://cdn.datatables.net/buttons/3.2.1/js/buttons.html5.min.js"></script>

        <script>
            $(document).ready(function () {
                $("#example").DataTable({
                    dom: "Bfrtip", // Position des éléments : boutons en haut
                    buttons: ["copy", "csv", "excel", "pdf", "print"],
                });
            });
        </script>
    </body>
</html>

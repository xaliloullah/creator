<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Color Picker</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="color-picker py-5 text-center">
            <h2>Choisissez votre couleur</h2>
            <input type="color" class="color-input" value="#007bff" />
            <input
                type="text"
                class="color-code form-control mt-3"
                placeholder="e.g. #007bff"
            />
            <button class="color-random btn btn-outline-primary mt-3">
                Couleur aléatoire
            </button>
        </div>

        <div class="color-picker py-5 text-center">
            <h2>Choisissez votre couleur</h2>
            <input type="color" class="color-input" value="#ff5733" />
            <input
                type="text"
                class="color-code form-control mt-3"
                placeholder="e.g. #ff5733"
            />
            <button class="color-random btn btn-outline-primary mt-3">
                Couleur aléatoire
            </button>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                document
                    .querySelectorAll(".color-picker")
                    .forEach((colorPicker) => {
                        const colorInput =
                            colorPicker.querySelector(".color-input");
                        const colorCode =
                            colorPicker.querySelector(".color-code");
                        const colorRandom =
                            colorPicker.querySelector(".color-random");

                        function updateColor(color) {
                            colorInput.value = color;
                            colorCode.value = color;
                        }

                        colorInput.addEventListener("input", (e) =>
                            updateColor(e.target.value)
                        );
                        colorCode.addEventListener("input", (e) =>
                            updateColor(e.target.value)
                        );
                        colorRandom.addEventListener("click", () => {
                            const randomColor =
                                "#" +
                                Math.floor(Math.random() * 16777215)
                                    .toString(16)
                                    .padStart(6, "0");
                            updateColor(randomColor);
                        });
                    });
            });
        </script>
    </body>
</html>

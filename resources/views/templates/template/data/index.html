<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Products - DevStudio</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css"
        />
    </head>
    <body class="bg-light">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="bg-white shadow-sm">
            <div class="container-fluid px-4 py-3">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item">
                        <a href="#" class="text-decoration-none">Dashboard</a>
                    </li>
                    <li class="breadcrumb-item active">Products</li>
                </ol>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="container-fluid px-4 py-4">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-0">Products</h1>
                    <p class="text-muted mb-0">Manage your product catalog</p>
                </div>
                <a href="create.html" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-2"></i>Add New Product
                </a>
            </div>

            <!-- Data Table Card -->
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <table id="productsTable" class="table w-100">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Product Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th>Created Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div class="modal fade" id="deleteModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header border-0">
                        <h5 class="modal-title">Delete Product</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body text-center py-4">
                        <i
                            class="bi bi-exclamation-triangle text-warning fs-1 mb-3"
                        ></i>
                        <h4 class="mb-3">Are you sure?</h4>
                        <p class="text-muted mb-0">
                            Do you really want to delete this product? This
                            process cannot be undone.
                        </p>
                    </div>
                    <div class="modal-footer border-0">
                        <form id="deleteForm" method="POST">
                            <input
                                type="hidden"
                                name="csrfmiddlewaretoken"
                                value="your-csrf-token"
                            />
                            <button
                                type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                            >
                                Cancel
                            </button>
                            <button type="submit" class="btn btn-danger">
                                Delete Product
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div
                class="toast align-items-center text-white bg-success border-0"
                role="alert"
                aria-live="assertive"
                aria-atomic="true"
            >
                <div class="d-flex">
                    <div class="toast-body">
                        <i class="bi bi-check-circle me-2"></i>
                        Operation completed successfully!
                    </div>
                    <button
                        type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"
                    ></button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
        <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
        <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>
        <script>
            // Sample data
            const products = Array.from({ length: 50 }, (_, i) => ({
                id: i + 1,
                name: `Product ${i + 1}`,
                category: ["Electronics", "Clothing", "Food", "Books"][
                    Math.floor(Math.random() * 4)
                ],
                price: (Math.random() * 1000).toFixed(2),
                stock: Math.floor(Math.random() * 100),
                status: ["Active", "Inactive", "Draft"][
                    Math.floor(Math.random() * 3)
                ],
                created: new Date(
                    Date.now() - Math.random() * 10000000000
                ).toISOString(),
            }));

            $(document).ready(function () {
                // Initialize DataTable
                const table = $("#productsTable").DataTable({
                    data: products,
                    responsive: true,
                    columns: [
                        { data: "id" },
                        { data: "name" },
                        { data: "category" },
                        {
                            data: "price",
                            render: function (data) {
                                return `$${parseFloat(data).toFixed(2)}`;
                            },
                        },
                        { data: "stock" },
                        {
                            data: "status",
                            render: function (data) {
                                const colors = {
                                    Active: "success",
                                    Inactive: "danger",
                                    Draft: "warning",
                                };
                                return `<span class="badge bg-${colors[data]}">${data}</span>`;
                            },
                        },
                        {
                            data: "created",
                            render: function (data) {
                                return new Date(data).toLocaleDateString();
                            },
                        },
                        {
                            data: null,
                            orderable: false,
                            render: function (data) {
                                return `
                                <div class="dropdown">
                                    <button class="btn btn-sm btn-icon" data-bs-toggle="dropdown">
                                        <i class="bi bi-three-dots-vertical"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <a class="dropdown-item" href="view.html?id=${data.id}">
                                                <i class="bi bi-eye me-2"></i>View Details
                                            </a>
                                        </li>
                                        <li>
                                            <a class="dropdown-item" href="edit.html?id=${data.id}">
                                                <i class="bi bi-pencil me-2"></i>Edit
                                            </a>
                                        </li>
                                        <li><hr class="dropdown-divider"></li>
                                        <li>
                                            <button class="dropdown-item text-danger"
                                                    onclick="confirmDelete(${data.id})">
                                                <i class="bi bi-trash me-2"></i>Delete
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                            `;
                            },
                        },
                    ],
                    order: [[0, "desc"]],
                    pageLength: 10,
                    lengthMenu: [
                        [10, 25, 50, 100],
                        [10, 25, 50, 100],
                    ],
                    language: {
                        search: "",
                        searchPlaceholder: "Search products...",
                    },
                });

                // Style the search input
                $(".dataTables_filter input").addClass("form-control");
                $(".dataTables_length select").addClass("form-select");
            });

            // Delete confirmation
            function confirmDelete(id) {
                const modal = new bootstrap.Modal(
                    document.getElementById("deleteModal")
                );
                const form = document.getElementById("deleteForm");
                form.action = `/products/${id}/delete/`;
                modal.show();
            }

            // Show success toast
            function showToast(message) {
                const toast = new bootstrap.Toast(
                    document.querySelector(".toast")
                );
                document.querySelector(".toast-body").textContent = message;
                toast.show();
            }
        </script>
    </body>
</html>
